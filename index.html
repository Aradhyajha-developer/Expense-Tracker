<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

       <h1>
💰 Expense Tracker
</h1>

<p class="subtitle">
Manage your money easily
</p> 

       <div class="summary">

    <div class="card balance-card">
        <h4>Balance</h4>
        <h2 id="balance">₹0.00</h2>
    </div>


    <div class="card income-card">
        <h4>Income</h4>
        <h2 id="income">₹0.00</h2>
    </div>


    <div class="card expense-card">
        <h4>Expense</h4>
        <h2 id="expense">₹0.00</h2>
    </div>

</div>
<h3 class="section-title">
    Add Transaction
</h3>
        <form id="form">

            <input
                type="text"
                id="text"
                placeholder="Description"
                required
            >

            <input
                type="number"
                id="amount"
                placeholder="Amount (+/-)"
                required
            >

            <button type="submit">
                Add Transaction
            </button>

        </form>

        <ul id="transactions" class="list">

        </ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
